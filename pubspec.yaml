publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  lucide_icons: ^0.257.0 
  google_fonts: ^6.1.0
  flutter_riverpod: ^2.4.9
  uuid: ^3.0.7
  
  # Database Hive (Lebih stabil untuk setup sekarang)
  hive: ^2.2.3
